        const supported = ['en','zh-Hans','zh-Hant','ja','ko','es','fr','de','pt-BR','it','ru','ar'];
        const normalize = (value) => {
          if (!value) return null;
          const tag = value.replaceAll('_', '-');
          if (supported.includes(tag)) return tag;
          const lower = tag.toLowerCase();
          if (/^zh-(tw|hk|mo|hant)/.test(lower)) return 'zh-Hant';
          if (lower.startsWith('zh')) return 'zh-Hans';
          if (lower.startsWith('pt')) return 'pt-BR';
          return supported.find((code) => lower.startsWith(code.toLowerCase())) ?? null;
        };
        const saved = normalize(localStorage.getItem('mrfung.siteLanguage'));
        const browser = navigator.languages?.map(normalize).find(Boolean) ?? normalize(navigator.language);
        const target = `/${saved ?? browser ?? 'en'}${routePath}`.replace(/\/+/g, '/');
        window.location.replace(target.endsWith('/') ? target : `${target}/`);
      })();</script></head><body class="mf-static-page"><nav class="site-nav" aria-label="Primary navigation"><div class="nav-inner"><div class="nav-links"><a href="/en/">Home</a><a href="/en/apps/">Apps</a><a href="/en/writing/">Writing</a><a href="/en/about/">About</a><a href="mailto:2578033436@qq.com">Contact</a></div><label class="language-switcher"><span>Language</span><select data-language-switcher aria-label="Language"><option value="en" selected data-path="/en/404/">English</option><option value="zh-Hans" data-path="/zh-Hans/404/">简体中文</option><option value="zh-Hant" data-path="/zh-Hant/404/">繁體中文</option><option value="ja" data-path="/ja/404/">日本語</option><option value="ko" data-path="/ko/404/">한국어</option><option value="es" data-path="/es/404/">Español</option><option value="fr" data-path="/fr/404/">Français</option><option value="de" data-path="/de/404/">Deutsch</option><option value="pt-BR" data-path="/pt-BR/404/">Português (Brasil)</option><option value="it" data-path="/it/404/">Italiano</option><option value="ru" data-path="/ru/404/">Русский</option><option value="ar" data-path="/ar/404/">العربية</option></select></label><script type="module">document.querySelectorAll(`[data-language-switcher]`).forEach(e=>{e.addEventListener(`change`,e=>{let t=e.currentTarget;if(!(t instanceof HTMLSelectElement))return;localStorage.setItem(`mrfung.siteLanguage`,t.value);let n=t.selectedOptions[0]?.dataset.path;n&&window.location.assign(n)})});</script></div></nav><header class="mf-page-hero compact"><div class="mf-hero-inner"><p class="mf-kicker">404</p><h1>Page not found</h1><div class="mf-hero-copy"><p>这个页面可能已经移动或不存在。</p></div></div></header><main class="section"><div class="bilingual"><article class="lang-card"><span class="lang-label">中文</span><h3>回到可用入口</h3><p>你可以回到首页，或者查看 BillLoopr 的支持和隐私页面。</p><p><a href="/">返回首页</a></p></article><article class="lang-card"><span class="lang-label">English</span><h3>Use a current entry</h3><p>You can return home or open the Bill
